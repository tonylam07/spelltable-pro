<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browse Games — SpellTable Pro+</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { font-family: system-ui, sans-serif; background: #0f0f14; color: #e8e8ef; margin: 0; }
        .wrap { max-width: 960px; margin: 0 auto; padding: 32px 20px; }
        h1 { margin: 0 0 8px; font-size: 28px; }
        .sub { color: #9999a8; margin-bottom: 24px; }
        .filters { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
        .filters select, .filters button {
            background: #1b1b24; color: #e8e8ef; border: 1px solid #2b2b38;
            padding: 8px 14px; border-radius: 6px; font-size: 14px; cursor: pointer;
        }
        .filters button.primary { background: #5c4fff; border-color: #5c4fff; }
        .list { display: grid; gap: 12px; }
        .row {
            display: grid; grid-template-columns: 1fr auto auto;
            align-items: center; gap: 16px;
            background: #17171f; border: 1px solid #26262f; border-radius: 8px;
            padding: 14px 18px;
        }
        .row .name { font-weight: 600; }
        .row .meta { color: #9999a8; font-size: 13px; margin-top: 2px; }
        .seats { font-family: ui-monospace, monospace; color: #9999a8; font-size: 13px; }
        .join { background: #5c4fff; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .join:hover { background: #4a3fe0; }
        .empty { text-align: center; color: #6b6b7a; padding: 48px 0; }
        .error { color: #ff6b6b; padding: 12px; background: #2a1419; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="wrap">
        <h1>Browse Public Games</h1>
        <p class="sub">Join an open lobby and start playing.</p>

        <div class="filters">
            <select id="format-filter">
                <option value="">All formats</option>
                <option value="commander">Commander</option>
                <option value="modern">Modern</option>
                <option value="standard">Standard</option>
                <option value="pioneer">Pioneer</option>
                <option value="legacy">Legacy</option>
                <option value="pauper">Pauper</option>
                <option value="casual">Casual</option>
            </select>
            <button id="refresh">Refresh</button>
            <button class="primary" onclick="location.href='index.html'">Host a game</button>
        </div>

        <div id="status"></div>
        <div class="list" id="game-list"></div>
    </div>

    <script>
    (async function () {
        const list = document.getElementById('game-list');
        const status = document.getElementById('status');
        const fmt = document.getElementById('format-filter');

        async function load() {
            status.innerHTML = '';
            list.innerHTML = '<div class="empty">Loading…</div>';
            const params = new URLSearchParams();
            if (fmt.value) params.set('format', fmt.value);
            try {
                const res = await fetch('/api/games/browse/public?' + params.toString());
                const json = await res.json();
                if (!json.success) throw new Error(json.error || 'Failed to load');

                if (!json.data.length) {
                    list.innerHTML = '<div class="empty">No open games right now. Be the first to host one.</div>';
                    return;
                }
                list.innerHTML = json.data.map(renderRow).join('');
                list.querySelectorAll('[data-join]').forEach(btn => {
                    btn.addEventListener('click', () => join(btn.dataset.join));
                });
            } catch (err) {
                list.innerHTML = '';
                status.innerHTML = `<div class="error">${err.message}</div>`;
            }
        }

        function renderRow(g) {
            const host = g.host?.displayName || 'Someone';
            return `
                <div class="row">
                    <div>
                        <div class="name">${escapeHtml(g.name)}</div>
                        <div class="meta">${escapeHtml(g.format)} · hosted by ${escapeHtml(host)}</div>
                    </div>
                    <div class="seats">${g.players}/${g.maxPlayers} seats</div>
                    <button class="join" data-join="${escapeHtml(g.gameId)}">Join</button>
                </div>`;
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
        }

        function join(gameId) {
            location.href = `index.html?game=${encodeURIComponent(gameId)}`;
        }

        document.getElementById('refresh').addEventListener('click', load);
        fmt.addEventListener('change', load);
        load();
    })();
    </script>
</body>
</html>
